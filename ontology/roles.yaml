    label: Sub bass
    description: Dedicated sub layer (often < 80 Hz).
    kind: source
    default_bus_group: BASS
    inference:
      keywords:
      - sub
      - subbass
      - sub bass
      regex:
      - (?i)\bsub\s*bass\b
      - (?i)\bsubbass\b
