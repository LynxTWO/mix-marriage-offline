plugin_id: "PLUGIN.RENDERER.STARTER.BAD_LAYOUT_SPECIFIC"
plugin_type: "renderer"
name: "Bad Layout-Specific Starter Example"
version: "0.1.0"
description: "Intentional invalid example: layout_specific without layout support."
entrypoint: "starter_true_multichannel_checksum:StarterTrueMultichannelChecksum"
capabilities:
  max_channels: 32
  channel_mode: "true_multichannel"
  supported_group_sizes:
    - 6
    - 12
  scene_scope: "object_capable"
  layout_safety: "layout_specific"
  latency:
    type: "dynamic"
  deterministic_seed_policy: "seed_required"
  purity:
    audio_buffer: "typed_f64_interleaved"
    randomness: "process_context_seed"
    wall_clock: "forbidden"
    thread_scheduling: "forbidden"
  supported_contexts:
    - "render"
  dsp_traits:
    tier: "information_preserving"
    linearity: "linear"
    phase_behavior: "linear_phase"
    adds_noise: false
    introduces_harmonics: false
    anti_aliasing: "na"
    measurable_claims:
      - metric_id: "METER.TRUE_PEAK_DBTP"
        expected_direction: "within"
        threshold: 0.5
        note: "This file is supposed to fail validation."
declares:
  problem_domains:
    - "rendering"
    - "translation"
  target_scopes:
    - "scene"
    - "target_layout"
behavior_contract:
  loudness_behavior: "bounded"
  max_integrated_lufs_delta: 2.0
  peak_behavior: "bounded"
  max_true_peak_delta_db: 0.5
  phase_behavior: "translation_safe"
  gain_compensation: "not_required"
  rationale: "Intentional invalid example for layout support only; the behavior contract itself is explicit."
