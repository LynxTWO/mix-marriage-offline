plugin_id: "PLUGIN.RENDERER.STARTER.LINKED_GROUP_BED"
plugin_type: "renderer"
name: "Starter Linked-Group Bed"
version: "0.1.0"
description: "Tiny starter example for linked_group execution with bed-only safety semantics."
entrypoint: "starter_linked_group_bed:StarterLinkedGroupBed"
capabilities:
  max_channels: 32
  channel_mode: "linked_group"
  supported_group_sizes:
    - 3
    - 4
  supported_link_groups:
    - "front"
    - "surrounds"
    - "heights"
  bed_only: true
  scene_scope: "bed_only"
  layout_safety: "layout_agnostic"
  latency:
    type: "fixed"
    samples: 64
  deterministic_seed_policy: "none"
  purity:
    audio_buffer: "typed_f64_interleaved"
    randomness: "forbidden"
    wall_clock: "forbidden"
    thread_scheduling: "forbidden"
  supported_standards:
    - "SMPTE"
    - "FILM"
  supported_contexts:
    - "render"
  scene:
    supports_objects: false
    supports_beds: true
    supports_locks: false
    requires_speaker_positions: false
  dsp_traits:
    tier: "information_preserving"
    linearity: "linear"
    phase_behavior: "linear_phase"
    adds_noise: false
    introduces_harmonics: false
    anti_aliasing: "na"
    measurable_claims:
      - metric_id: "METER.TRUE_PEAK_DBTP"
        expected_direction: "within"
        threshold: 0.5
        note: "Applies one deterministic trim to a semantic channel group."
  notes:
    - "Starter example that the host may restrict to bed recommendations."
declares:
  problem_domains:
    - "utility"
    - "translation"
  target_scopes:
    - "stem"
    - "bus"
behavior_contract:
  loudness_behavior: "bounded"
  max_integrated_lufs_delta: 1.5
  peak_behavior: "bounded"
  max_true_peak_delta_db: 1.5
  phase_behavior: "preserve"
  stereo_image_behavior: "preserve"
  gain_compensation: "not_required"
  rationale: "This starter example intentionally applies a fixed linked-group trim for demonstration."
