plugin_id: "PLUGIN.RENDERER.TEST.TRUE_MULTICHANNEL_SUMCHECK"
plugin_type: "renderer"
name: "True-Multichannel Sumcheck Fixture"
version: "0.1.0"
description: "Test-only fixture that verifies full-buffer access and writes a deterministic checksum tone."
entrypoint: "true_multichannel_sumcheck_fixture:TrueMultichannelSumcheckFixture"
capabilities:
  max_channels: 32
  channel_mode: "true_multichannel"
  deterministic_seed_policy: "seed_required"
  purity:
    audio_buffer: "typed_f64_interleaved"
    randomness: "process_context_seed"
    wall_clock: "forbidden"
    thread_scheduling: "forbidden"
  supported_standards:
    - "SMPTE"
    - "FILM"
    - "LOGIC_PRO"
    - "VST3"
    - "AAF"
  supported_contexts:
    - "render"
