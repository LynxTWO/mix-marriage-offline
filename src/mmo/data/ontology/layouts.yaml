# Canonical Layouts
# LAYOUT.* IDs define channel layouts and canonical channel ordering.
# Layouts reference SPK.* from ontology/speakers.yaml.
# Coordinate convention for speaker_positions follows speakers.yaml:
#   azimuth_deg: 0° = front center; + = left; - = right
#   elevation_deg: 0° = ear level; + = up

layouts:
  _meta:
    layouts_version: "1.0.0"
    id_prefix: "LAYOUT."
    channel_index_base: 0
    ordering_standards:
      - "SMPTE"      # WAV/FLAC/WavPack/FFmpeg/Atmos bed: L R C LFE Ls Rs (etc.)
      - "FILM"       # Pro Tools / cinema dub stage: L C R Ls Rs LFE (etc.)
      - "LOGIC_PRO"  # Logic Pro / DTS: L R Ls Rs C LFE (5.1); L R Lrs Rrs Ls Rs C LFE (7.1)
      - "VST3"       # Steinberg Cubase/Nuendo 7.1+: rears (Lrs Rrs) before sides (Lss Rss)
      - "AAF"        # AAF/OMF/XML interchange: channel order read from embedded metadata
    conventions:
      - "channel_order is the canonical order MMO will use internally when it must impose one."
      - "ordering_variants are accepted for inference/import; core should normalize to canonical."
      - "channel_groups are semantic buckets used for surround meters and detectors."
      - "bed_speakers excludes heights; LFE is bed."
      - "speaker_positions uses azimuth_deg (0=front,+=left,-=right) and elevation_deg (0=ear,+=up)."
      - "lfe_policy.excluded_from_program_loudness is always true (ITU-R BS.1770)."
    channel_groups:
      enum:
        - "front"
        - "center"
        - "surround"
        - "rear"
        - "height"
        - "lfe"
        - "bed"
        - "objects"

  # -------------------------
  # Mono / Stereo
  # -------------------------
  LAYOUT.1_0:
    label: "Mono (1.0)"
    description: "Single-channel mono."
    family: "mono"
    channel_count: 1
    ordering_standard: "SMPTE"
    channel_order: ["SPK.M"]
    channel_groups:
      center: ["SPK.M"]
      bed: ["SPK.M"]
    bed_speakers: ["SPK.M"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.M", azimuth_deg: 0, elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["1.0", "1_0", "mono", "M"]

  LAYOUT.2_0:
    label: "Stereo (2.0)"
    description: "Standard stereo left/right."
    family: "stereo"
    channel_count: 2
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      bed: ["SPK.L", "SPK.R"]
    bed_speakers: ["SPK.L", "SPK.R"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.L", azimuth_deg: 30, elevation_deg: 0}
      - {spk_id: "SPK.R", azimuth_deg: -30, elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["2.0", "2_0", "stereo", "LR", "L R"]

  LAYOUT.2_1:
    label: "Stereo + LFE (2.1)"
    description: "Stereo left/right plus LFE."
    family: "stereo"
    channel_count: 3
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.LFE"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.LFE"]
      FILM: ["SPK.L", "SPK.R", "SPK.LFE"]
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.LFE"]
      VST3: ["SPK.L", "SPK.R", "SPK.LFE"]
      AAF: ["SPK.L", "SPK.R", "SPK.LFE"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      lfe: ["SPK.LFE"]
      bed: ["SPK.L", "SPK.R", "SPK.LFE"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.LFE"]
    height_speakers: []
    has_lfe: true
    speaker_positions:
      - {spk_id: "SPK.L",   azimuth_deg: 30,  elevation_deg: 0}
      - {spk_id: "SPK.R",   azimuth_deg: -30, elevation_deg: 0}
      - {spk_id: "SPK.LFE", azimuth_deg: 0,   elevation_deg: 0}
    lfe_policy:
      has_lfe: true
      lfe_channels: ["SPK.LFE"]
      excluded_from_program_loudness: true
      default_downmix_treatment: "drop"
    aliases: ["2.1", "2_1", "stereo+lfe", "LRLFE"]

  LAYOUT.BINAURAL:
    label: "Binaural (headphones)"
    description: "Two-channel headphone binaural render deliverable."
    family: "stereo"
    channel_count: 2
    ordering_standard: "SMPTE"
    channel_order: ["SPK.HL", "SPK.HR"]
    ordering_variants:
      SMPTE: ["SPK.HL", "SPK.HR"]
      FILM: ["SPK.HL", "SPK.HR"]
      LOGIC_PRO: ["SPK.HL", "SPK.HR"]
      VST3: ["SPK.HL", "SPK.HR"]
      AAF: ["SPK.HL", "SPK.HR"]
    channel_groups:
      front: ["SPK.HL", "SPK.HR"]
      bed: ["SPK.HL", "SPK.HR"]
    bed_speakers: ["SPK.HL", "SPK.HR"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.HL", azimuth_deg: 90, elevation_deg: 0}
      - {spk_id: "SPK.HR", azimuth_deg: -90, elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["binaural", "headphones", "headphone", "hp"]

  # -------------------------
  # Front stage (LCR)
  # -------------------------
  LAYOUT.3_0:
    label: "LCR (3.0)"
    description: "Front Left, Center, Front Right."
    family: "surround"
    channel_count: 3
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C"]
      FILM: ["SPK.L", "SPK.C", "SPK.R"]
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.C"]
      VST3: ["SPK.L", "SPK.R", "SPK.C"]
      AAF: ["SPK.L", "SPK.C", "SPK.R"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      bed: ["SPK.L", "SPK.R", "SPK.C"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.C"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.L", azimuth_deg: 30,  elevation_deg: 0}
      - {spk_id: "SPK.R", azimuth_deg: -30, elevation_deg: 0}
      - {spk_id: "SPK.C", azimuth_deg: 0,   elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["3.0", "3_0", "lcr", "L C R"]

  LAYOUT.3_1:
    label: "LCR + LFE (3.1)"
    description: "Front Left, Center, Front Right plus LFE."
    family: "surround"
    channel_count: 4
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE"]
      FILM: ["SPK.L", "SPK.C", "SPK.R", "SPK.LFE"]
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE"]
      VST3: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE"]
      AAF: ["SPK.L", "SPK.C", "SPK.R", "SPK.LFE"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      lfe: ["SPK.LFE"]
      bed: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE"]
    height_speakers: []
    has_lfe: true
    speaker_positions:
      - {spk_id: "SPK.L",   azimuth_deg: 30,  elevation_deg: 0}
      - {spk_id: "SPK.R",   azimuth_deg: -30, elevation_deg: 0}
      - {spk_id: "SPK.C",   azimuth_deg: 0,   elevation_deg: 0}
      - {spk_id: "SPK.LFE", azimuth_deg: 0,   elevation_deg: 0}
    lfe_policy:
      has_lfe: true
      lfe_channels: ["SPK.LFE"]
      excluded_from_program_loudness: true
      default_downmix_treatment: "drop"
    aliases: ["3.1", "3_1", "lcr+lfe", "L C R LFE"]

  # -------------------------
  # Quad / 4.0
  # -------------------------
  LAYOUT.4_0:
    label: "Quad (4.0)"
    description: "Front L/R plus Surround L/R (no center, no LFE)."
    family: "surround"
    channel_count: 4
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
      FILM: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
      VST3: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
      AAF: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      surround: ["SPK.LS", "SPK.RS"]
      bed: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.L",  azimuth_deg: 30,   elevation_deg: 0}
      - {spk_id: "SPK.R",  azimuth_deg: -30,  elevation_deg: 0}
      - {spk_id: "SPK.LS", azimuth_deg: 110,  elevation_deg: 0}
      - {spk_id: "SPK.RS", azimuth_deg: -110, elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["4.0", "4_0", "quad", "quadraphonic"]

  LAYOUT.4_1:
    label: "Quad + LFE (4.1)"
    description: "Front L/R plus Surround L/R plus LFE."
    family: "surround"
    channel_count: 5
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.LFE", "SPK.LS", "SPK.RS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.LFE", "SPK.LS", "SPK.RS"]
      FILM: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LFE"]
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LFE"]
      VST3: ["SPK.L", "SPK.R", "SPK.LFE", "SPK.LS", "SPK.RS"]
      AAF: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LFE"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      lfe: ["SPK.LFE"]
      surround: ["SPK.LS", "SPK.RS"]
      bed: ["SPK.L", "SPK.R", "SPK.LFE", "SPK.LS", "SPK.RS"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.LFE", "SPK.LS", "SPK.RS"]
    height_speakers: []
    has_lfe: true
    speaker_positions:
      - {spk_id: "SPK.L",   azimuth_deg: 30,   elevation_deg: 0}
      - {spk_id: "SPK.R",   azimuth_deg: -30,  elevation_deg: 0}
      - {spk_id: "SPK.LFE", azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LS",  azimuth_deg: 110,  elevation_deg: 0}
      - {spk_id: "SPK.RS",  azimuth_deg: -110, elevation_deg: 0}
    lfe_policy:
      has_lfe: true
      lfe_channels: ["SPK.LFE"]
      excluded_from_program_loudness: true
      default_downmix_treatment: "drop"
    aliases: ["4.1", "4_1", "quad+lfe"]

  # -------------------------
  # 5.0 / 5.1 / 5.2
  # -------------------------
  LAYOUT.5_0:
    label: "Surround (5.0)"
    description: "L/R/C plus Surround L/R (no LFE)."
    family: "surround"
    channel_count: 5
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS"]
      FILM: ["SPK.L", "SPK.C", "SPK.R", "SPK.LS", "SPK.RS"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      surround: ["SPK.LS", "SPK.RS"]
      bed: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.L",  azimuth_deg: 30,   elevation_deg: 0}
      - {spk_id: "SPK.R",  azimuth_deg: -30,  elevation_deg: 0}
      - {spk_id: "SPK.C",  azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LS", azimuth_deg: 110,  elevation_deg: 0}
      - {spk_id: "SPK.RS", azimuth_deg: -110, elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["5.0", "5_0", "surround5", "5ch"]

  LAYOUT.5_1:
    label: "Surround (5.1)"
    description: "L/R/C/LFE plus Surround L/R."
    family: "surround"
    channel_count: 6
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS"]
      FILM: ["SPK.L", "SPK.C", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LFE"]
      AAC: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS"]
      # Logic Pro / DTS native: surrounds before centre, LFE last.
      # Very common in Apple-ecosystem workflows — do NOT assume SMPTE if no mask.
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS", "SPK.C", "SPK.LFE"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      lfe: ["SPK.LFE"]
      surround: ["SPK.LS", "SPK.RS"]
      bed: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS"]
    height_speakers: []
    has_lfe: true
    speaker_positions:
      - {spk_id: "SPK.L",   azimuth_deg: 30,   elevation_deg: 0}
      - {spk_id: "SPK.R",   azimuth_deg: -30,  elevation_deg: 0}
      - {spk_id: "SPK.C",   azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LFE", azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LS",  azimuth_deg: 110,  elevation_deg: 0}
      - {spk_id: "SPK.RS",  azimuth_deg: -110, elevation_deg: 0}
    lfe_policy:
      has_lfe: true
      lfe_channels: ["SPK.LFE"]
      excluded_from_program_loudness: true
      default_downmix_treatment: "drop"
      fold_at_minus_10db_available: true
    aliases: ["5.1", "5_1", "surround51", "6ch", "L R C LFE Ls Rs"]

  LAYOUT.5_2:
    label: "Surround (5.2)"
    description: "5.1 plus a second LFE channel (LFE2)."
    family: "surround"
    channel_count: 7
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LFE2", "SPK.LS", "SPK.RS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LFE2", "SPK.LS", "SPK.RS"]
      FILM: ["SPK.L", "SPK.C", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LFE", "SPK.LFE2"]
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.LS", "SPK.RS", "SPK.C", "SPK.LFE", "SPK.LFE2"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      lfe: ["SPK.LFE", "SPK.LFE2"]
      surround: ["SPK.LS", "SPK.RS"]
      bed: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LFE2", "SPK.LS", "SPK.RS"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LFE2", "SPK.LS", "SPK.RS"]
    height_speakers: []
    has_lfe: true
    speaker_positions:
      - {spk_id: "SPK.L",    azimuth_deg: 30,   elevation_deg: 0}
      - {spk_id: "SPK.R",    azimuth_deg: -30,  elevation_deg: 0}
      - {spk_id: "SPK.C",    azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LFE",  azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LFE2", azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LS",   azimuth_deg: 110,  elevation_deg: 0}
      - {spk_id: "SPK.RS",   azimuth_deg: -110, elevation_deg: 0}
    lfe_policy:
      has_lfe: true
      lfe_channels: ["SPK.LFE", "SPK.LFE2"]
      excluded_from_program_loudness: true
      default_downmix_treatment: "drop"
      fold_at_minus_10db_available: true
    aliases: ["5.2", "5_2", "surround52", "dual_lfe_5_2", "L R C LFE LFE2 Ls Rs"]

  # -------------------------
  # 7.0 / 7.1 / 7.2
  # -------------------------
  LAYOUT.7_0:
    label: "Surround (7.0)"
    description: "5.0 plus Rear Surround L/R (no LFE)."
    family: "surround"
    channel_count: 7
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
      FILM: ["SPK.L", "SPK.C", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      surround: ["SPK.LS", "SPK.RS"]
      rear: ["SPK.LRS", "SPK.RRS"]
      bed: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
    bed_speakers: ["SPK.L", "SPK.R", "SPK.C", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
    height_speakers: []
    has_lfe: false
    speaker_positions:
      - {spk_id: "SPK.L",   azimuth_deg: 30,   elevation_deg: 0}
      - {spk_id: "SPK.R",   azimuth_deg: -30,  elevation_deg: 0}
      - {spk_id: "SPK.C",   azimuth_deg: 0,    elevation_deg: 0}
      - {spk_id: "SPK.LS",  azimuth_deg: 110,  elevation_deg: 0}
      - {spk_id: "SPK.RS",  azimuth_deg: -110, elevation_deg: 0}
      - {spk_id: "SPK.LRS", azimuth_deg: 150,  elevation_deg: 0}
      - {spk_id: "SPK.RRS", azimuth_deg: -150, elevation_deg: 0}
    lfe_policy:
      has_lfe: false
      lfe_channels: []
      excluded_from_program_loudness: true
      default_downmix_treatment: "n/a"
    aliases: ["7.0", "7_0", "surround70", "7ch"]

  LAYOUT.7_1:
    label: "Surround (7.1)"
    description: "5.1 plus Rear Surround L/R."
    family: "surround"
    channel_count: 8
    ordering_standard: "SMPTE"
    channel_order: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
    ordering_variants:
      SMPTE: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS"]
      FILM: ["SPK.L", "SPK.C", "SPK.R", "SPK.LS", "SPK.RS", "SPK.LRS", "SPK.RRS", "SPK.LFE"]
      # Logic Pro / DTS: rear surrounds precede sides; centre and LFE at end.
      LOGIC_PRO: ["SPK.L", "SPK.R", "SPK.LRS", "SPK.RRS", "SPK.LS", "SPK.RS", "SPK.C", "SPK.LFE"]
      # Steinberg VST3: rears (Lrs Rrs) at slots 5-6, sides (Lss Rss) at slots 7-8.
      # Opposite of SMPTE — mixing these up inverts front/back panning in VST3 plugins.
      VST3: ["SPK.L", "SPK.R", "SPK.C", "SPK.LFE", "SPK.LRS", "SPK.RRS", "SPK.LS", "SPK.RS"]
    channel_groups:
      front: ["SPK.L", "SPK.R"]
      center: ["SPK.C"]
      lfe: ["SPK.LFE"]
