plugin_id: "PLUGIN.DETECTOR.CLIPPING_HEADROOM"
plugin_type: "detector"
name: "Clipping + Headroom Detector"
version: "0.1.0"
license: "Apache-2.0"
description: "Detects clipping samples and insufficient headroom using meter evidence."
mmo_min_version: "0.1.0"
ontology_min_version: "0.1.0"
entrypoint: "mmo.plugins.detectors.clipping_headroom_detector:ClippingHeadroomDetector"
capabilities:
  max_channels: 32
  channel_mode: "linked_group"
  supported_group_sizes:
    - 1
    - 2
  supported_link_groups:
    - "front"
    - "custom"
  scene_scope: "object_capable"
  layout_safety: "layout_agnostic"
  supported_contexts:
    - "suggest"
declares:
  problem_domains:
    - "safety"
    - "headroom"
  emits_issue_ids:
    - "ISSUE.SAFETY.CLIPPING_SAMPLES"
    - "ISSUE.SAFETY.INSUFFICIENT_HEADROOM"
  target_scopes:
    - "stem"
    - "bus"
