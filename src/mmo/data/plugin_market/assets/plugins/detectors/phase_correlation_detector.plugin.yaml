plugin_id: "PLUGIN.DETECTOR.PHASE_CORRELATION"
plugin_type: "detector"
name: "Phase Correlation Detector"
version: "0.1.0"
license: "Apache-2.0"
description: "Detects negative correlation for stereo stems and multichannel pair correlations."
mmo_min_version: "0.1.0"
ontology_min_version: "0.1.0"
entrypoint: "mmo.plugins.detectors.phase_correlation_detector:PhaseCorrelationDetector"
capabilities:
  max_channels: 32
  channel_mode: "linked_group"
  supported_group_sizes:
    - 2
  supported_link_groups:
    - "front"
    - "surrounds"
    - "custom"
  scene_scope: "object_capable"
  layout_safety: "layout_agnostic"
  supported_contexts:
    - "suggest"
declares:
  problem_domains:
    - "imaging"
    - "phase"
  emits_issue_ids:
    - "ISSUE.IMAGING.NEGATIVE_CORRELATION"
    - "ISSUE.IMAGING.NEGATIVE_CORRELATION_PAIR"
  target_scopes:
    - "stem"
    - "bus"
