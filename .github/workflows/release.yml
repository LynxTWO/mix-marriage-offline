name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests
        # Release tags only proceed after the same repo-local pytest runner the
        # docs ask operators to use for local validation.
        run: tools/run_pytest.sh -q

  build-manual:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PDF dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[pdf]"

      - name: Build User Manual PDF
        run: >
          python tools/build_user_manual.py
          --manifest docs/manual/manual.yaml
          --out sandbox_tmp/manual/MMO_User_Manual.pdf

      - name: Upload manual artifact
        uses: actions/upload-artifact@v6
        with:
          name: mmo-user-manual-pdf
          path: sandbox_tmp/manual/MMO_User_Manual.pdf

  build-python-dist:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mmo-python-dist
          path: dist/

  build-binaries:
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact-label: ubuntu-latest
          - runner: windows-2025
            artifact-label: windows-latest
          - runner: macos-15
            artifact-label: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install binary build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[truth,pdf]" pyinstaller nuitka ordered-set zstandard

      - name: Build standalone binary (PyInstaller + Nuitka fallback)
        # The helper script records which backend won and why the other one
        # failed, so release logs keep that fallback visible.
        run: python tools/build_binaries.py --output-dir dist

      - name: Smoke standalone CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cliExe = Get-ChildItem -Path dist -Filter "mmo-windows-*.exe" | Sort-Object Name | Select-Object -First 1
          if (-not $cliExe) {
            throw "Could not find built MMO CLI binary under dist/."
          }

          & $cliExe.FullName --version
          if ($LASTEXITCODE -ne 0) {
            throw "CLI smoke failed: '$($cliExe.Name) --version' exited $LASTEXITCODE."
          }

          & $cliExe.FullName --help
          if ($LASTEXITCODE -ne 0) {
            throw "CLI smoke failed: '$($cliExe.Name) --help' exited $LASTEXITCODE."
          }

      - name: Smoke standalone CLI binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cli_bin="$(find dist -maxdepth 1 -type f -name 'mmo-*' ! -name '*.sha256' ! -name '*.zip' ! -name '*.gz' | sort | head -n 1)"
          if [ -z "$cli_bin" ]; then
            echo "Could not find built MMO CLI binary under dist/." >&2
            exit 1
          fi

          "$cli_bin" --version
          "$cli_bin" --help

      - name: Upload binary artifacts
        # Upload raw binaries and checksums together so later release assembly
        # does not have to reconstruct which digest matched which file.
        uses: actions/upload-artifact@v6
        with:
          name: mmo-binaries-${{ matrix.artifact-label }}
          path: |
            dist/mmo-*
          if-no-files-found: error

  # ── Windows MSI version mapping ─────────────────────────────────────
  # MSI requires numeric-only version identifiers (max 65535 per component).
  # The public app version stays SemVer (e.g. 1.0.0 or 1.0.1-rc.1).
  # For MSI bundling only, tauri.conf.json sets bundle.windows.wix.version
  # to a 4-part numeric form:
  #   X.Y.Z       →  X.Y.Z.0   (stable: build component = 0)
  #   X.Y.Z-rc.N  →  X.Y.Z.N   (prerelease: 4th component = RC number)
  # This override is scoped to WiX/MSI; Linux/macOS bundles use the
  # SemVer app version unchanged.
  # ────────────────────────────────────────────────────────────────────
  build-desktop-tauri-packaged:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: mmo-desktop-tauri-bundles-linux
            artifact-path: gui/desktop-tauri/src-tauri/target/release/bundle/**/*.AppImage
            tauri-bundles: appimage
          - os: windows-2025
            artifact-name: mmo-desktop-tauri-bundles-windows
          - os: macos-15
            artifact-name: mmo-desktop-tauri-bundles-macos
            artifact-path: gui/desktop-tauri/src-tauri/target/release/bundle/**/*.app.zip
            tauri-bundles: app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/desktop-tauri/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          webkit_pkg=""
          for candidate in libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev; do
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              webkit_pkg="$candidate"
              break
            fi
          done
          appindicator_pkg=""
          for candidate in libayatana-appindicator3-dev libappindicator3-dev; do
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              appindicator_pkg="$candidate"
              break
            fi
          done
          if [ -z "$webkit_pkg" ] || [ -z "$appindicator_pkg" ]; then
            echo "Could not resolve Linux Tauri dependency packages on this runner." >&2
            exit 1
          fi
          sudo apt-get install -y "$webkit_pkg" "$appindicator_pkg" ffmpeg librsvg2-dev patchelf xvfb

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg --no-progress -y
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            throw "FFmpeg install failed or is not on PATH after choco install."
          }
          ffmpeg -version | Select-Object -First 1

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94.0

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: gui/desktop-tauri/src-tauri -> target

      - name: Install sidecar build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[truth,pdf]" pyinstaller nuitka ordered-set zstandard

      - name: Install desktop app dependencies
        working-directory: gui/desktop-tauri
        run: npm ci

      - name: Install Playwright browser (Linux)
        if: runner.os == 'Linux'
        working-directory: gui/desktop-tauri
        run: npx playwright install --with-deps firefox

      - name: Install Playwright browser (non-Linux)
        if: runner.os != 'Linux'
        working-directory: gui/desktop-tauri
        run: npx playwright install firefox

      - name: Run desktop frontend lint
        working-directory: gui/desktop-tauri
        run: npm run lint --if-present

      - name: Run desktop frontend tests
        working-directory: gui/desktop-tauri
        run: npm test --if-present

      # Optional Windows code-signing env hooks for release CI:
      # - MMO_WINDOWS_CERT_BASE64: base64-encoded .pfx contents
      # - MMO_WINDOWS_CERT_PASSWORD: password for the .pfx
      # - MMO_WINDOWS_CERT_THUMBPRINT: expected SHA-1 certificate thumbprint
      # - MMO_WINDOWS_TIMESTAMP_URL: RFC3161 timestamp URL
      - name: Prepare optional Windows code signing
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          MMO_WINDOWS_CERT_BASE64: ${{ secrets.MMO_WINDOWS_CERT_BASE64 }}
          MMO_WINDOWS_CERT_PASSWORD: ${{ secrets.MMO_WINDOWS_CERT_PASSWORD }}
          MMO_WINDOWS_CERT_THUMBPRINT: ${{ secrets.MMO_WINDOWS_CERT_THUMBPRINT }}
          MMO_WINDOWS_TIMESTAMP_URL: ${{ secrets.MMO_WINDOWS_TIMESTAMP_URL }}
        run: |
          # Missing signing inputs disable the signing path cleanly. They do not
          # leave the workflow in a half-configured state.
          if ([string]::IsNullOrWhiteSpace($env:MMO_WINDOWS_CERT_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:MMO_WINDOWS_CERT_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:MMO_WINDOWS_CERT_THUMBPRINT)) {
            Write-Host "Windows code signing disabled: signing secrets are not fully configured."
            "MMO_WINDOWS_SIGNING_ENABLED=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            exit 0
          }

          $certPath = Join-Path $env:RUNNER_TEMP "mmo-windows-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:MMO_WINDOWS_CERT_BASE64))
          $securePassword = ConvertTo-SecureString -String $env:MMO_WINDOWS_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -Password $securePassword -CertStoreLocation Cert:\CurrentUser\My -Exportable
          Remove-Item $certPath -Force

          if (-not $cert) {
            throw "Failed to import the Windows signing certificate into Cert:\\CurrentUser\\My."
          }

          $expectedThumbprint = $env:MMO_WINDOWS_CERT_THUMBPRINT.Replace(" ", "").ToUpperInvariant()
          $actualThumbprint = $cert.Thumbprint.Replace(" ", "").ToUpperInvariant()
          if ($actualThumbprint -ne $expectedThumbprint) {
            throw "Imported certificate thumbprint mismatch. Expected $expectedThumbprint, got $actualThumbprint."
          }

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:MMO_WINDOWS_TIMESTAMP_URL)) {
            "http://timestamp.digicert.com"
          } else {
            $env:MMO_WINDOWS_TIMESTAMP_URL.Trim()
          }

          "MMO_WINDOWS_SIGNING_ENABLED=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MMO_WINDOWS_CERT_THUMBPRINT_EFFECTIVE=$actualThumbprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MMO_WINDOWS_TIMESTAMP_URL_EFFECTIVE=$timestampUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows code signing enabled for thumbprint $actualThumbprint."

      - name: Build desktop app payload (Windows signing-aware)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: gui/desktop-tauri
        env:
          PYTHON: python
        run: |
          # Signed Windows releases build the unsigned payload first, sign the
          # real binaries, then bundle installers from that signed payload.
          if ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true") {
            Write-Host "Windows signing enabled: building the desktop payload without bundling first."
            npm run tauri build -- --no-bundle --no-sign
          } else {
            Write-Host "Windows signing disabled: building Windows installers directly."
            npm run tauri build -- --bundles msi,nsis --no-sign
          }

      - name: Sign Windows app payload binaries (optional)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:MMO_WINDOWS_SIGNING_ENABLED -ne "true") {
            Write-Host "Skipping Windows payload signing."
            exit 0
          }

          $signtool = Get-Command signtool -ErrorAction SilentlyContinue
          if (-not $signtool) {
            throw "signtool is not available on PATH."
          }

          $config = Get-Content "gui/desktop-tauri/src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $productName = [string]$config.productName
          if ([string]::IsNullOrWhiteSpace($productName)) {
            throw "Missing productName in gui/desktop-tauri/src-tauri/tauri.conf.json."
          }

          $releaseDir = Resolve-Path "gui/desktop-tauri/src-tauri/target/release"
          $desktopExe = Get-Item (Join-Path $releaseDir "$productName.exe") -ErrorAction SilentlyContinue
          if (-not $desktopExe) {
            $desktopExe = Get-ChildItem -Path $releaseDir -File -Filter "*.exe" |
              Where-Object { $_.Name -notlike "mmo*.exe" -and $_.Name -notin @("crashpad_handler.exe", "uninstall.exe") } |
              Sort-Object @{ Expression = { if ($_.Name -eq "$productName.exe") { 0 } else { 1 } } }, FullName |
              Select-Object -First 1
          }

          $payloads = @()
          if ($desktopExe) {
            $payloads += $desktopExe
          }
          $payloads += @(Get-ChildItem -Path "gui/desktop-tauri/src-tauri/binaries" -File -Filter "*.exe" -ErrorAction SilentlyContinue | Sort-Object FullName)
          $payloads = @($payloads | Sort-Object FullName -Unique)
          if (-not $payloads) {
            throw "Could not find Windows payload binaries to sign."
          }

          foreach ($payload in $payloads) {
            Write-Host "Signing Windows payload binary: $($payload.Name)"
            & $signtool.Source sign /fd SHA256 /sha1 $env:MMO_WINDOWS_CERT_THUMBPRINT_EFFECTIVE /tr $env:MMO_WINDOWS_TIMESTAMP_URL_EFFECTIVE /td SHA256 $payload.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool sign failed for $($payload.Name) with exit code $LASTEXITCODE."
            }
          }

      - name: Verify Windows app payload signatures (pre-bundle)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $config = Get-Content "gui/desktop-tauri/src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $productName = [string]$config.productName
          $releaseDir = Resolve-Path "gui/desktop-tauri/src-tauri/target/release"
          $desktopExe = Get-Item (Join-Path $releaseDir "$productName.exe") -ErrorAction SilentlyContinue
          if (-not $desktopExe) {
            $desktopExe = Get-ChildItem -Path $releaseDir -File -Filter "*.exe" |
              Where-Object { $_.Name -notlike "mmo*.exe" -and $_.Name -notin @("crashpad_handler.exe", "uninstall.exe") } |
              Sort-Object @{ Expression = { if ($_.Name -eq "$productName.exe") { 0 } else { 1 } } }, FullName |
              Select-Object -First 1
          }

          $payloads = @()
          if ($desktopExe) {
            $payloads += $desktopExe
          }
          $payloads += @(Get-ChildItem -Path "gui/desktop-tauri/src-tauri/binaries" -File -Filter "*.exe" -ErrorAction SilentlyContinue | Sort-Object FullName)
          $payloads = @($payloads | Sort-Object FullName -Unique)
          if (-not $payloads) {
            if ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true") {
              throw "Could not find Windows payload binaries to verify."
            }
            Write-Warning "No Windows payload binaries were found to verify."
            exit 0
          }

          foreach ($payload in $payloads) {
            $signature = Get-AuthenticodeSignature -FilePath $payload.FullName
            $subject = if ($signature.SignerCertificate) {
              $signature.SignerCertificate.Subject
            } else {
              "(none)"
            }
            Write-Host "Authenticode receipt: file=$($payload.Name) status=$($signature.Status) signer=$subject"
            if ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true" -and $signature.Status -ne "Valid") {
              throw "Expected a valid Authenticode signature on $($payload.Name), got $($signature.Status)."
            }
          }

      - name: Bundle desktop installers from signed payload (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: gui/desktop-tauri
        env:
          PYTHON: python
        run: |
          if ($env:MMO_WINDOWS_SIGNING_ENABLED -ne "true") {
            Write-Host "Skipping signed-payload bundling because Windows signing is disabled."
            exit 0
          }

          npm run tauri bundle -- --bundles msi,nsis --no-sign

      - name: Sign Windows installers (optional)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:MMO_WINDOWS_SIGNING_ENABLED -ne "true") {
            Write-Host "Skipping Windows installer signing."
            exit 0
          }

          $signtool = Get-Command signtool -ErrorAction SilentlyContinue
          if (-not $signtool) {
            throw "signtool is not available on PATH."
          }

          $artifacts = Get-ChildItem -Path "gui/desktop-tauri/src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Name -like "*-setup.exe" -or $_.Extension -eq ".msi" } |
            Sort-Object FullName
          if (-not $artifacts) {
            throw "Could not find built Windows installer artifacts to sign."
          }

          foreach ($artifact in $artifacts) {
            Write-Host "Signing Windows artifact: $($artifact.Name)"
            & $signtool.Source sign /fd SHA256 /sha1 $env:MMO_WINDOWS_CERT_THUMBPRINT_EFFECTIVE /tr $env:MMO_WINDOWS_TIMESTAMP_URL_EFFECTIVE /td SHA256 $artifact.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "signtool sign failed for $($artifact.Name) with exit code $LASTEXITCODE."
            }
          }

      - name: Build desktop packaged bundle (non-Windows)
        if: runner.os != 'Windows'
        working-directory: gui/desktop-tauri
        env:
          PYTHON: python
        # Non-Windows platforms can bundle directly because the signing split
        # above is only needed for the Windows payload and installer chain.
        run: npm run tauri build -- --bundles ${{ matrix.tauri-bundles }}

      - name: Smoke packaged desktop bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a python tools/smoke_packaged_desktop.py --repo-root .

      - name: Smoke packaged desktop installer (Windows real install)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundleRoot = Resolve-Path "gui/desktop-tauri/src-tauri/target/release/bundle"
          $installer = Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Name -like "*-setup.exe" -or $_.Extension -eq ".msi" } |
            Sort-Object @{ Expression = { if ($_.Name.ToLowerInvariant().EndsWith("-setup.exe")) { 0 } else { 1 } } }, FullName |
            Select-Object -First 1
          if (-not $installer) {
            throw "Could not find a built Windows installer under the bundle root."
          }

          $statePath = Join-Path $env:RUNNER_TEMP "mmo-windows-install-state.json"
          "MMO_WINDOWS_INSTALL_STATE_PATH=$statePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Smoking packaged installer artifact: $($installer.Name)"
          Write-Host "Windows install state recorded for later verification."
          python tools/smoke_packaged_desktop.py --repo-root . --artifact "$($installer.FullName)" --windows-install-state-path "$statePath" --defer-windows-cleanup
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          "MMO_WINDOWS_INSTALL_SMOKE_OK=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify installed Windows payload signatures
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MMO_WINDOWS_INSTALL_STATE_PATH)) {
            Write-Host "No Windows install state path was recorded."
            exit 0
          }

          if (-not (Test-Path $env:MMO_WINDOWS_INSTALL_STATE_PATH)) {
            if ($env:MMO_WINDOWS_INSTALL_SMOKE_OK -eq "true") {
              throw "Expected the Windows install state file after a successful smoke run."
            }
            Write-Warning "Windows install state file is missing; the smoke step likely failed before install receipts were persisted."
            exit 0
          }

          $state = Get-Content $env:MMO_WINDOWS_INSTALL_STATE_PATH -Raw | ConvertFrom-Json
          Write-Host "Installed artifact label: $([System.IO.Path]::GetFileName([string]$state.artifact_path))"
          Write-Host "Installer log captured: $(-not [string]::IsNullOrWhiteSpace([string]$state.install_log_path))"
          Write-Host "Detected install location: $(-not [string]::IsNullOrWhiteSpace([string]$state.install_root))"

          $targets = @()
          if (-not [string]::IsNullOrWhiteSpace([string]$state.installed_app_path)) {
            if (Test-Path $state.installed_app_path) {
              $targets += Get-Item $state.installed_app_path
            } elseif ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true" -and $env:MMO_WINDOWS_INSTALL_SMOKE_OK -eq "true") {
              throw "Installed desktop app executable is missing: $([System.IO.Path]::GetFileName([string]$state.installed_app_path))"
            } else {
              Write-Warning "Installed desktop app executable is missing: $([System.IO.Path]::GetFileName([string]$state.installed_app_path))"
            }
          }

          if ($state.installed_sidecar_paths) {
            foreach ($sidecarPath in $state.installed_sidecar_paths) {
              if (Test-Path $sidecarPath) {
                $targets += Get-Item $sidecarPath
              } elseif ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true" -and $env:MMO_WINDOWS_INSTALL_SMOKE_OK -eq "true") {
                throw "Installed sidecar executable is missing: $([System.IO.Path]::GetFileName([string]$sidecarPath))"
              } else {
                Write-Warning "Installed sidecar executable is missing: $([System.IO.Path]::GetFileName([string]$sidecarPath))"
              }
            }
          } else {
            Write-Host "Installed sidecar paths: (none recorded)"
          }

          $targets = @($targets | Sort-Object FullName -Unique)
          if (-not $targets) {
            if ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true" -and $env:MMO_WINDOWS_INSTALL_SMOKE_OK -eq "true") {
              throw "No installed Windows payload binaries were available for signature verification."
            }
            Write-Warning "No installed Windows payload binaries were available for signature verification."
            exit 0
          }

          foreach ($target in $targets) {
            $signature = Get-AuthenticodeSignature -FilePath $target.FullName
            $subject = if ($signature.SignerCertificate) {
              $signature.SignerCertificate.Subject
            } else {
              "(none)"
            }
            Write-Host "Installed Authenticode receipt: file=$($target.Name) status=$($signature.Status) signer=$subject"
            if ($env:MMO_WINDOWS_SIGNING_ENABLED -eq "true" -and $env:MMO_WINDOWS_INSTALL_SMOKE_OK -eq "true" -and $signature.Status -ne "Valid") {
              throw "Expected a valid installed Authenticode signature on $($target.Name), got $($signature.Status)."
            }
          }

      - name: Cleanup Windows smoke install (best effort)
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MMO_WINDOWS_INSTALL_STATE_PATH)) {
            Write-Host "No Windows install state path was recorded; nothing to clean up."
            exit 0
          }

          python tools/smoke_packaged_desktop.py --cleanup-windows-install-state "$env:MMO_WINDOWS_INSTALL_STATE_PATH"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Smoke packaged desktop bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: python tools/smoke_packaged_desktop.py --repo-root .

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          app_path="$(find gui/desktop-tauri/src-tauri/target/release/bundle -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Could not find built .app bundle." >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$app_path.zip"

      - name: Upload desktop packaged bundle (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            gui/desktop-tauri/src-tauri/target/release/bundle/**/*.msi
            gui/desktop-tauri/src-tauri/target/release/bundle/**/*-setup.exe
          if-no-files-found: error

      - name: Upload desktop packaged bundle (non-Windows)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    needs: [build-python-dist, build-binaries, build-desktop-tauri-packaged, build-manual]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download wheel/sdist artifacts
        uses: actions/download-artifact@v7
        with:
          name: mmo-python-dist
          path: dist/

      - name: Download binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: mmo-binaries-*
          merge-multiple: true
          path: dist/

      - name: Download desktop packaged bundles
        uses: actions/download-artifact@v7
        with:
          pattern: mmo-desktop-tauri-bundles-*
          merge-multiple: true
          path: dist/desktop/

      - name: Download manual PDF
        uses: actions/download-artifact@v7
        with:
          name: mmo-user-manual-pdf
          path: dist/

      - name: Create GitHub Release
        # Release assembly only pulls uploaded artifacts. That keeps the final
        # GitHub release tied to the exact outputs smoke and validation saw.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MMO ${{ env.RELEASE_TAG }}"
          body_path: CHANGELOG.md
          files: dist/**
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc') }}
