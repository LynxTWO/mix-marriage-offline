name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests
        run: tools/run_pytest.sh -q

  build-manual:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[pdf]"

      - name: Build User Manual PDF
        run: >
          python tools/build_user_manual.py
          --manifest docs/manual/manual.yaml
          --out sandbox_tmp/manual/MMO_User_Manual.pdf

      - name: Upload manual artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmo-user-manual-pdf
          path: sandbox_tmp/manual/MMO_User_Manual.pdf

  build-python-dist:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmo-python-dist
          path: dist/

  build-binaries:
    needs: [validate, build-manual]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install binary build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[truth,pdf,gui]" pyinstaller nuitka ordered-set zstandard

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install AppImage tooling (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 wget
          wget -qO /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          echo "APPIMAGETOOL=/tmp/appimagetool.AppImage" >> "$GITHUB_ENV"

      - name: Download manual PDF
        uses: actions/download-artifact@v4
        with:
          name: mmo-user-manual-pdf
          path: dist/manual/

      - name: Build standalone binary (PyInstaller + Nuitka fallback)
        run: python tools/build_binaries.py --output-dir dist --with-gui

      - name: Smoke test Windows GUI passthrough modules
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $guiExe = Get-ChildItem -Path dist -Filter "mmo-gui-windows-*.exe" | Sort-Object Name | Select-Object -First 1
          if (-not $guiExe) {
            throw "Could not find built mmo-gui Windows binary under dist/."
          }

          & $guiExe.FullName -m mmo --help
          if ($LASTEXITCODE -ne 0) {
            throw "Passthrough smoke failed: '$($guiExe.Name) -m mmo --help' exited $LASTEXITCODE."
          }

          & $guiExe.FullName -m mmo.tools.analyze_stems --help
          if ($LASTEXITCODE -ne 0) {
            throw "Passthrough smoke failed: '$($guiExe.Name) -m mmo.tools.analyze_stems --help' exited $LASTEXITCODE."
          }

      - name: Build one-click installers
        env:
          MMO_WINDOWS_PFX_PATH: ${{ secrets.MMO_WINDOWS_PFX_PATH }}
          MMO_WINDOWS_PFX_PASSWORD: ${{ secrets.MMO_WINDOWS_PFX_PASSWORD }}
          MMO_WINDOWS_TIMESTAMP_URL: ${{ secrets.MMO_WINDOWS_TIMESTAMP_URL }}
          MMO_MACOS_SIGN_IDENTITY: ${{ secrets.MMO_MACOS_SIGN_IDENTITY }}
          MMO_LINUX_GPG_KEY_ID: ${{ secrets.MMO_LINUX_GPG_KEY_ID }}
        run: python tools/build_installers.py --input-dir dist --output-dir dist/installers --version "${{ env.RELEASE_TAG }}" --manual-pdf dist/manual/MMO_User_Manual.pdf

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmo-binaries-${{ matrix.os }}
          path: |
            dist/mmo-*
            dist/MMO-*
            dist/installers/*.exe
            dist/installers/*.zip
            dist/installers/*.AppImage
            dist/installers/*.asc
            dist/installers/*.sha256
          if-no-files-found: error

  release:
    needs: [build-python-dist, build-binaries, build-manual]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wheel/sdist artifacts
        uses: actions/download-artifact@v4
        with:
          name: mmo-python-dist
          path: dist/

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mmo-binaries-*
          merge-multiple: true
          path: dist/

      - name: Download manual PDF
        uses: actions/download-artifact@v4
        with:
          name: mmo-user-manual-pdf
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "MMO ${{ env.RELEASE_TAG }}"
          body_path: CHANGELOG.md
          files: dist/**
          draft: false
          prerelease: false
