name: ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Fetch base branch for ontology diff
        run: git fetch --no-tags --depth=1 origin main

      - name: Validate ontology additive-change policy
        run: python tools/validate_ontology_changes.py --repo-root . --base-ref origin/main --require-base-ref

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests (xdist)
        run: MMO_PYTEST_N=auto tools/run_pytest.sh -q

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Fetch base branch for ontology diff
        run: git fetch --no-tags --depth=1 origin main

      - name: Validate ontology additive-change policy
        run: python tools/validate_ontology_changes.py --repo-root . --base-ref origin/main --require-base-ref

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests (xdist)
        shell: pwsh
        env:
          MMO_PYTEST_N: auto
        run: .\tools\run_pytest.ps1 -q

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Fetch base branch for ontology diff
        run: git fetch --no-tags --depth=1 origin main

      - name: Validate ontology additive-change policy
        run: python tools/validate_ontology_changes.py --repo-root . --base-ref origin/main --require-base-ref

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests (xdist)
        run: MMO_PYTEST_N=auto tools/run_pytest.sh -q

  linux-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Run tests (serial)
        run: tools/run_pytest.sh -q

  screenshots-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install GUI + screenshot deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb python3-tk
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,screenshots,pdf]"

      - name: Regenerate screenshots
        run: >
          xvfb-run -a python tools/capture_gui_screenshots.py
          --out-dir /tmp/mmo-gui-screenshots

      - name: Upload generated screenshots for debugging
        uses: actions/upload-artifact@v4
        with:
          name: mmo-gui-screenshots
          path: /tmp/mmo-gui-screenshots/

      - name: Perceptual diff check (committed vs generated)
        run: >
          python tools/check_screenshot_diff.py
          --committed docs/manual/assets/screenshots
          --generated /tmp/mmo-gui-screenshots

  docs-manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install PDF dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[pdf]"

      - name: Build User Manual PDF
        run: >
          python tools/build_user_manual.py
          --manifest docs/manual/manual.yaml
          --out sandbox_tmp/manual/MMO_User_Manual.pdf

      - name: Upload manual artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmo-user-manual-pdf
          path: sandbox_tmp/manual/MMO_User_Manual.pdf

  gui:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Run GUI tests
        working-directory: gui
        run: npm test

  desktop-tauri:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: mmo-desktop-tauri-linux
            binary-path: gui/desktop-tauri/src-tauri/target/release/mmo-desktop-tauri
          - os: windows-latest
            artifact-name: mmo-desktop-tauri-windows
            binary-path: gui/desktop-tauri/src-tauri/target/release/mmo-desktop-tauri.exe
          - os: macos-latest
            artifact-name: mmo-desktop-tauri-macos
            binary-path: gui/desktop-tauri/src-tauri/target/release/mmo-desktop-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/desktop-tauri/package-lock.json

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          webkit_pkg=""
          for candidate in libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev; do
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              webkit_pkg="$candidate"
              break
            fi
          done
          appindicator_pkg=""
          for candidate in libayatana-appindicator3-dev libappindicator3-dev; do
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              appindicator_pkg="$candidate"
              break
            fi
          done
          if [ -z "$webkit_pkg" ] || [ -z "$appindicator_pkg" ]; then
            echo "Could not resolve Linux Tauri dependency packages on this runner." >&2
            exit 1
          fi
          sudo apt-get install -y "$webkit_pkg" "$appindicator_pkg" librsvg2-dev patchelf

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: gui/desktop-tauri/src-tauri -> target

      - name: Install desktop app dependencies
        working-directory: gui/desktop-tauri
        run: npm ci

      - name: Run desktop frontend lint
        working-directory: gui/desktop-tauri
        run: npm run lint --if-present

      - name: Run desktop frontend tests
        working-directory: gui/desktop-tauri
        run: npm test --if-present

      - name: Build desktop release binary
        working-directory: gui/desktop-tauri
        run: npm run tauri build -- --no-bundle

      - name: Upload desktop release binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary-path }}
          if-no-files-found: error
