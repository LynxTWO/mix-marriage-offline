name: ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Fetch base branch for ontology diff
        run: git fetch --no-tags --depth=1 origin main

      - name: Validate ontology additive-change policy
        run: python tools/validate_ontology_changes.py --repo-root . --base-ref origin/main --require-base-ref

      # Runs all contract sub-checks in one pass: UI.SPECS, UI.EXAMPLES,
      # ONTOLOGY.REFS, PLUGINS, PLUGINS.UI, PKG.MIRROR, DOCS.MILESTONES,
      # DOCS.GUI_PARITY, GUI.TAURI_DESIGN, DOCS.USER_MANUAL, MSI.VERSION,
      # plus internal schema, scene/translation/roles/gates/targets registry
      # checks.
      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run golden fixtures
        run: python -m pytest -q tests/test_golden_fixtures.py

      - name: Run plugin mode golden tests
        run: python -m pytest -q tests/test_plugin_modes_golden.py

      - name: Run tests (xdist)
        run: MMO_PYTEST_N=auto tools/run_pytest.sh -q

  windows:
    runs-on: windows-2025
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Fetch base branch for ontology diff
        run: git fetch --no-tags --depth=1 origin main

      - name: Validate ontology additive-change policy
        run: python tools/validate_ontology_changes.py --repo-root . --base-ref origin/main --require-base-ref

      # Runs all contract sub-checks in one pass: UI.SPECS, UI.EXAMPLES,
      # ONTOLOGY.REFS, PLUGINS, PLUGINS.UI, PKG.MIRROR, DOCS.MILESTONES,
      # DOCS.GUI_PARITY, GUI.TAURI_DESIGN, DOCS.USER_MANUAL, MSI.VERSION,
      # plus internal schema, scene/translation/roles/gates/targets registry
      # checks.
      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run golden fixtures
        shell: pwsh
        run: python -m pytest -q tests/test_golden_fixtures.py

      - name: Run plugin mode golden tests
        shell: pwsh
        run: python -m pytest -q tests/test_plugin_modes_golden.py

      - name: Run tests (xdist)
        shell: pwsh
        env:
          MMO_PYTEST_N: auto
        run: .\tools\run_pytest.ps1 -q

  macos:
    runs-on: macos-15
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Fetch base branch for ontology diff
        run: git fetch --no-tags --depth=1 origin main

      - name: Validate ontology additive-change policy
        run: python tools/validate_ontology_changes.py --repo-root . --base-ref origin/main --require-base-ref

      # Runs all contract sub-checks in one pass: UI.SPECS, UI.EXAMPLES,
      # ONTOLOGY.REFS, PLUGINS, PLUGINS.UI, PKG.MIRROR, DOCS.MILESTONES,
      # DOCS.GUI_PARITY, GUI.TAURI_DESIGN, DOCS.USER_MANUAL, MSI.VERSION,
      # plus internal schema, scene/translation/roles/gates/targets registry
      # checks.
      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run golden fixtures
        run: python -m pytest -q tests/test_golden_fixtures.py

      - name: Run plugin mode golden tests
        run: python -m pytest -q tests/test_plugin_modes_golden.py

      - name: Run tests (xdist)
        run: MMO_PYTEST_N=auto tools/run_pytest.sh -q

  linux-serial:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Run tests (serial)
        run: tools/run_pytest.sh -q

  screenshots-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/desktop-tauri/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install screenshot diff deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[screenshots,pdf]"

      - name: Install desktop screenshot frontend deps
        working-directory: gui/desktop-tauri
        run: npm ci

      - name: Install Playwright browser
        working-directory: gui/desktop-tauri
        run: npx playwright install --with-deps firefox

      - name: Regenerate screenshots
        run: >
          python tools/capture_tauri_screenshots.py
          --out-dir /tmp/mmo-tauri-screenshots

      - name: Upload generated screenshots for debugging
        uses: actions/upload-artifact@v6
        with:
          name: mmo-tauri-screenshots
          path: /tmp/mmo-tauri-screenshots/

      - name: Perceptual diff check (committed vs generated)
        run: >
          python tools/check_screenshot_diff.py
          --committed docs/manual/assets/screenshots
          --generated /tmp/mmo-tauri-screenshots

  docs-manual:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install PDF dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[pdf]"

      - name: Build User Manual PDF
        run: >
          python tools/build_user_manual.py
          --manifest docs/manual/manual.yaml
          --out sandbox_tmp/manual/MMO_User_Manual.pdf

      - name: Upload manual artifact
        uses: actions/upload-artifact@v6
        with:
          name: mmo-user-manual-pdf
          path: sandbox_tmp/manual/MMO_User_Manual.pdf

  gui:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Run GUI tests
        working-directory: gui
        run: npm test

  # ── Windows MSI version mapping ─────────────────────────────────────
  # MSI requires numeric-only version identifiers (max 65535 per component).
  # The public app version stays SemVer (e.g. 1.0.0 or 1.0.1-rc.1).
  # For MSI bundling only, tauri.conf.json sets bundle.windows.wix.version
  # to a 4-part numeric form:
  #   X.Y.Z       →  X.Y.Z.0   (stable: build component = 0)
  #   X.Y.Z-rc.N  →  X.Y.Z.N   (prerelease: 4th component = RC number)
  # ────────────────────────────────────────────────────────────────────
  desktop-tauri:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: mmo-desktop-tauri-bundles-linux
            artifact_path: gui/desktop-tauri/src-tauri/target/release/bundle/**/*.AppImage
            tauri_bundles: appimage
          - os: windows-2025
            artifact_name: mmo-desktop-tauri-bundles-windows
            artifact_path: gui/desktop-tauri/src-tauri/target/release/bundle/**/*.msi
            tauri_bundles: msi
          - os: macos-15
            artifact_name: mmo-desktop-tauri-bundles-macos
            artifact_path: gui/desktop-tauri/src-tauri/target/release/bundle/**/*.app.zip
            tauri_bundles: app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: gui/desktop-tauri/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          webkit_pkg=""
          for candidate in libwebkit2gtk-4.1-dev libwebkit2gtk-4.0-dev; do
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              webkit_pkg="$candidate"
              break
            fi
          done
          appindicator_pkg=""
          for candidate in libayatana-appindicator3-dev libappindicator3-dev; do
            if apt-cache show "$candidate" >/dev/null 2>&1; then
              appindicator_pkg="$candidate"
              break
            fi
          done
          if [ -z "$webkit_pkg" ] || [ -z "$appindicator_pkg" ]; then
            echo "Could not resolve Linux Tauri dependency packages on this runner." >&2
            exit 1
          fi
          sudo apt-get install -y "$webkit_pkg" "$appindicator_pkg" ffmpeg librsvg2-dev patchelf xvfb

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg --no-progress -y
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            throw "FFmpeg install failed or is not on PATH after choco install."
          }
          ffmpeg -version | Select-Object -First 1

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.94.0

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: gui/desktop-tauri/src-tauri -> target

      - name: Install sidecar build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[truth,pdf]" pyinstaller nuitka ordered-set zstandard

      - name: Install desktop app dependencies
        working-directory: gui/desktop-tauri
        run: npm ci

      - name: Install Playwright browser (Linux)
        if: runner.os == 'Linux'
        working-directory: gui/desktop-tauri
        run: npx playwright install --with-deps firefox

      - name: Install Playwright browser (non-Linux)
        if: runner.os != 'Linux'
        working-directory: gui/desktop-tauri
        run: npx playwright install firefox

      - name: Run desktop frontend lint
        working-directory: gui/desktop-tauri
        run: npm run lint --if-present

      - name: Run desktop frontend tests
        working-directory: gui/desktop-tauri
        run: npm test --if-present

      - name: Build desktop packaged bundle
        working-directory: gui/desktop-tauri
        env:
          PYTHON: python
        run: npm run tauri build -- --bundles ${{ matrix.tauri_bundles }}

      - name: Smoke packaged desktop bundle (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: xvfb-run -a python tools/smoke_packaged_desktop.py --repo-root .

      - name: Smoke packaged desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tools/smoke_packaged_desktop.py --repo-root .

      - name: Smoke packaged desktop bundle (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: python tools/smoke_packaged_desktop.py --repo-root .

      - name: Archive macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          app_path="$(find gui/desktop-tauri/src-tauri/target/release/bundle -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "Could not find built .app bundle." >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$app_path.zip"

      - name: Upload desktop packaged bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
