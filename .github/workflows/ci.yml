name: ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests (xdist)
        run: MMO_PYTEST_N=auto tools/run_pytest.sh -q

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests (xdist)
        shell: pwsh
        env:
          MMO_PYTEST_N: auto
        run: .\tools\run_pytest.ps1 -q

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Validate contracts
        run: python tools/validate_contracts.py

      - name: Run tests (xdist)
        run: MMO_PYTEST_N=auto tools/run_pytest.sh -q

  linux-serial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,truth,pdf]"

      - name: Run tests (serial)
        run: tools/run_pytest.sh -q

  screenshots-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install GUI + screenshot deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb python3-tk
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,screenshots,pdf]"

      - name: Regenerate screenshots
        run: >
          xvfb-run -a python tools/capture_gui_screenshots.py
          --out-dir docs/manual/assets/screenshots

      - name: Upload screenshots for debugging
        uses: actions/upload-artifact@v4
        with:
          name: mmo-gui-screenshots
          path: docs/manual/assets/screenshots/

      - name: Enforce committed screenshots match generated
        run: git diff --exit-code docs/manual/assets/screenshots/

  docs-manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          allow-prereleases: true

      - name: Install PDF dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[pdf]"

      - name: Build User Manual PDF
        run: >
          python tools/build_user_manual.py
          --manifest docs/manual/manual.yaml
          --out sandbox_tmp/manual/MMO_User_Manual.pdf

      - name: Upload manual artifact
        uses: actions/upload-artifact@v4
        with:
          name: mmo-user-manual-pdf
          path: sandbox_tmp/manual/MMO_User_Manual.pdf

  gui:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: gui
        run: npm ci

      - name: Run GUI tests
        working-directory: gui
        run: npm test
