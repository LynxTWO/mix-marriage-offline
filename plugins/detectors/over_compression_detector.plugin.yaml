plugin_id: "PLUGIN.DETECTOR.OVER_COMPRESSION"
plugin_type: "detector"
name: "Over-Compression Detector"
version: "0.1.0"
license: "Apache-2.0"
description: "Conservatively flags over-compressed dynamics using crest factor and RMS."
mmo_min_version: "0.1.0"
ontology_min_version: "0.1.0"
entrypoint: "mmo.plugins.detectors.over_compression_detector:OverCompressionDetector"
capabilities:
  max_channels: 32
  channel_mode: "linked_group"
  supported_group_sizes:
    - 1
    - 2
  supported_link_groups:
    - "front"
    - "custom"
  scene_scope: "object_capable"
  layout_safety: "layout_agnostic"
  supported_contexts:
    - "suggest"
declares:
  problem_domains:
    - "dynamics"
    - "loudness"
  emits_issue_ids:
    - "ISSUE.DYNAMICS.OVER_COMPRESSION"
  target_scopes:
    - "stem"
    - "bus"
