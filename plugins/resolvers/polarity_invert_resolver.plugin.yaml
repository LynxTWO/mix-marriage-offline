plugin_id: "PLUGIN.RESOLVER.POLARITY_INVERT"
plugin_type: "resolver"
name: "Polarity Invert Resolver"
version: "0.1.0"
license: "Apache-2.0"
description: "Recommends polarity inversion for negatively correlated stereo stems."
mmo_min_version: "0.1.0"
ontology_min_version: "0.1.0"
entrypoint: "mmo.plugins.resolvers.polarity_invert_resolver:PolarityInvertResolver"
capabilities:
  max_channels: 32
  channel_mode: "linked_group"
  supported_group_sizes:
    - 2
  supported_link_groups:
    - "front"
    - "surrounds"
    - "custom"
  scene_scope: "object_capable"
  layout_safety: "layout_agnostic"
  supported_contexts:
    - "suggest"
declares:
  problem_domains:
    - "imaging"
    - "phase"
  consumes_issue_ids:
    - "ISSUE.IMAGING.NEGATIVE_CORRELATION"
    - "ISSUE.IMAGING.NEGATIVE_CORRELATION_PAIR"
  suggests_action_ids:
    - "ACTION.UTILITY.POLARITY_INVERT"
  target_scopes:
    - "stem"
    - "bus"
