plugin_id: "PLUGIN.RENDERER.GAIN_TRIM"
plugin_type: "renderer"
name: "Gain Trim Renderer"
version: "0.1.0"
license: "Apache-2.0"
description: "Render conservative stem-level gain/trim recommendations to WAV PCM outputs."
mmo_min_version: "0.1.0"
ontology_min_version: "0.1.0"
entrypoint: "mmo.plugins.renderers.gain_trim_renderer:GainTrimRenderer"
capabilities:
  max_channels: 32
  channel_mode: "true_multichannel"
  supported_group_sizes:
    - 1
    - 2
    - 6
    - 8
    - 10
    - 12
    - 16
    - 32
  supported_link_groups:
    - "front"
    - "surrounds"
    - "heights"
    - "all"
    - "custom"
  scene_scope: "object_capable"
  layout_safety: "layout_agnostic"
  deterministic_seed_policy: "none"
  purity:
    audio_buffer: "typed_f64_interleaved"
    randomness: "forbidden"
    wall_clock: "forbidden"
    thread_scheduling: "forbidden"
  supported_contexts:
    - "render"
    - "auto_apply"
  dsp_traits:
    tier: "information_preserving"
    linearity: "linear"
    phase_behavior: "linear_phase"
    adds_noise: false
    introduces_harmonics: false
    anti_aliasing: "na"
    measurable_claims:
      - metric_id: "METER.TRUE_PEAK_DBTP"
        expected_direction: "within"
        threshold: 0.2
        note: "Constrains true-peak drift under conservative gain trim."
      - metric_id: "METER.INTEGRATED_LUFS_DELTA"
        expected_direction: "within"
        threshold: 1.0
        note: "Limits loudness movement to declared trim intent."
  notes:
    - "Deterministic gain/trim rendering; no boosts."
declares:
  problem_domains:
    - "correction"
    - "rendering"
  target_scopes:
    - "stem"
    - "bus"
behavior_contract:
  loudness_behavior: "bounded"
  max_integrated_lufs_delta: 1.0
  peak_behavior: "bounded"
  max_true_peak_delta_db: 0.2
  phase_behavior: "preserve"
  stereo_image_behavior: "preserve"
  gain_compensation: "not_required"
  rationale: "Applies approved gain trims, so loudness movement intentionally follows the requested correction."
